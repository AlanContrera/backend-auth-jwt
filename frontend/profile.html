<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Perfil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <div class="card">
      <h1>Perfil</h1>
      <div id="profileCard" class="profile-card">
        <div class="avatar">👤</div>
        <div class="info">
          <div class="line"><strong id="name">Cargando...</strong></div>
          <div class="line muted" id="email">&nbsp;</div>
        </div>
      </div>
      <div id="profileStatus" class="muted" style="margin-top:12px"></div>
      <div class="actions" style="margin-top:16px">
        <button id="btnBack" class="tiny">Volver</button>
        <button id="btnLogoutProfile" class="primary">Cerrar sesión</button>
      </div>
    </div>
  </main>

  <script>
    const API = 'https://backend-auth-jwt-lato.onrender.com';
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = 'index.html';
    }

    async function loadProfile() {
      const statusEl = document.getElementById('profileStatus');
      try {
        statusEl.textContent = 'Cargando perfil...';
        const res = await fetch(`${API}/perfil`, { headers: { 'Authorization': token } });
        const text = await res.text();
        // intentar parsear JSON
        let data = null;
        try { data = text ? JSON.parse(text) : null; } catch(e) { data = null; }
        console.log('/perfil response', res.status, text, data);
        if (res.ok && data) {
          const email = data.email || '';
          const firstName = data.firstName || data.name || '';
          const lastName = data.lastName || data.surname || '';
          const fullname = (firstName || lastName) ? `${firstName} ${lastName}`.trim() : (email.split('@')[0] || 'Usuario');
          document.getElementById('name').textContent = fullname;
          document.getElementById('email').textContent = email;
          const ln = document.getElementById('lastname');
          if (ln) { ln.textContent = lastName || ''; ln.style.display = lastName ? 'inline' : 'none'; }
          statusEl.textContent = '';
        } else {
          // mostrar mensaje claro y limpiar token
          console.warn('Perfil no disponible', res.status, text);
          localStorage.removeItem('token');
          statusEl.textContent = 'No se pudo cargar el perfil. Vuelve a iniciar sesión.';
          setTimeout(() => window.location.href = 'index.html', 1500);
        }
      } catch (e) {
        console.error('Error cargando perfil:', e);
        statusEl.textContent = 'Error de red al cargar perfil.';
      }
    }

    document.getElementById('btnBack').addEventListener('click', () => { window.location.href = 'index.html'; });
    document.getElementById('btnLogoutProfile').addEventListener('click', () => { localStorage.removeItem('token'); window.location.href = 'index.html'; });

    loadProfile();
  </script>
</body>
</html>
