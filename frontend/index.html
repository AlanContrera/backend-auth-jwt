<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Auth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <div class="card">
      <div class="tabs" role="tablist">
        <button id="tabLogin" class="tab active" role="tab" aria-selected="true">Iniciar sesión</button>
        <button id="tabRegister" class="tab" role="tab" aria-selected="false">Registrarse</button>
      </div>

      <h1 id="cardTitle">Autenticación</h1>

      <form id="authForm" novalidate>
        <div id="nameFields">
          <label class="label">Nombre</label>
          <input id="firstName" type="text" placeholder="Tu nombre" required>

          <label class="label">Apellido</label>
          <input id="lastName" type="text" placeholder="Tu apellido" required>
        </div>
        <label class="label">Email</label>
        <input id="email" type="email" placeholder="tu@correo.com" required>

        <label class="label">Contraseña</label>
        <div class="password-row">
          <input id="password" type="password" placeholder="Tu Contraseña" required>
          <button type="button" id="togglePwd" class="tiny">Mostrar</button>
        </div>
        <div class="pwd-meter" aria-hidden="true">
          <div id="pwdMeter" class="meter-bar"></div>
        </div>
        <small id="pwdText" class="muted">&nbsp;</small>

        <div class="actions">
          <button id="btnLogin" type="button" class="primary">Iniciar sesión</button>
          <button id="btnRegister" type="button">Registrarse</button>
        </div>
      </form>

      <!-- estado oculto por petición del usuario: mensajes debajo de 'Iniciar sesión' removidos -->

      <!-- tokenArea oculto por seguridad: no mostrar token en UI -->
      <div id="tokenArea" class="tokenArea hidden" aria-hidden="true"></div>

      <div id="profile" class="profile hidden">
        <h3>Perfil</h3>
        <div class="profile-row"><strong>Email:</strong> <span id="profileEmail"></span></div>
        <div class="profile-row"><strong>ID:</strong> <span id="profileId"></span></div>
      </div>
    </div>
  </main>
  
  <!-- Modal de notificación -->
  <div id="modalOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal">
      <button id="modalClose" class="modal-close" aria-label="Cerrar">×</button>
      <div id="modalIcon" class="modal-icon"></div>
      <h3 id="modalTitle">Notificación</h3>
      <p id="modalMessage"></p>
      <div class="modal-actions">
        <button id="modalViewProfile" class="tiny hidden">Ver perfil</button>
        <button id="modalOk" class="primary">Aceptar</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
